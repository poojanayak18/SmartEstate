<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Login</title>

    <link rel="stylesheet" href="css/style.css">

</head>

<body class="auth-body">

    <div class="auth-overlay">

        <div class="auth-card">

            <h1>🏠 SmartEstate</h1>

            <h2>Welcome Back</h2>

            <p>Login to continue</p>


            <!-- EMAIL -->
            <div class="input-group">

                <input
                    type="email"
                    id="email"
                    placeholder="Enter Email">

            </div>


            <!-- PASSWORD -->
            <div class="input-group">

                <input
                    type="password"
                    id="password"
                    placeholder="Enter Password">

            </div>


            <!-- LOGIN BUTTON -->
            <button
                type="button"
                class="auth-btn"
                onclick="loginUser()">

                Login

            </button>


            <!-- LINK -->
            <div class="auth-link">

                Don't have an account?

                <a href="register.html">
                    Register
                </a>

            </div>

        </div>

    </div>

    <!-- IMPORTANT -->
    <script src="js/script.js"></script>

</body>

</html>
