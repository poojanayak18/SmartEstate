<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Register</title>

    <link rel="stylesheet" href="css/style.css">

</head>

<body class="auth-body">

    <div class="auth-overlay">

        <div class="auth-card">

            <h1>🏠 SmartEstate</h1>

            <h2>Create Account</h2>

            <p>Join SmartEstate Today</p>


            <!-- NAME -->
            <div class="input-group">

                <input
                    type="text"
                    id="name"
                    placeholder="Enter Name">

            </div>


            <!-- EMAIL -->
            <div class="input-group">

                <input
                    type="email"
                    id="email"
                    placeholder="Enter Email">

            </div>


            <!-- PASSWORD -->
            <div class="input-group">

                <input
                    type="password"
                    id="password"
                    placeholder="Enter Password">

            </div>


            <!-- ROLE -->
            <div class="input-group">

                <select id="role">

                    <option value="buyer">
                        Buyer
                    </option>

                    <option value="owner">
                        Owner
                    </option>

                </select>

            </div>


            <!-- REGISTER BUTTON -->
            <button
                type="button"
                class="auth-btn"
                onclick="registerUser()">

                Register

            </button>


            <!-- LINK -->
            <div class="auth-link">

                Already have an account?

                <a href="login.html">
                    Login
                </a>

            </div>

        </div>

    </div>

    <script src="js/script.js"></script>

</body>

</html>
